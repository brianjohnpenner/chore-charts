<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>Chore Charts</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon-192.svg" type="image/svg+xml">
    <script defer src="assets/icons.js?v=13"></script>
    <script defer src="assets/tabler-icons.js?v=1"></script>
    <script defer src="assets/app.js?v=18"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="assets/app.css?v=33">
  </head>
  <body>
    <main x-data="choreChartApp" x-cloak class="app-shell" :class="{ 'printing-all': printMode === 'all', 'printing-selected': printMode === 'selected' }">
      <header class="editor-panel">
        <div class="editor-header">
          <div>
            <h1>Chore Charts</h1>
            <p>Build the chart by row, then preview or print.</p>
          </div>
          <div class="print-actions">
            <button type="button" :class="{ active: viewMode === 'edit' }" @click="viewMode = 'edit'">Edit</button>
            <button type="button" :class="{ active: viewMode === 'preview' }" @click="viewMode = 'preview'">Preview</button>
            <button type="button" class="primary-button" @click="printChart('selected')">Print Current</button>
            <button type="button" @click="printChart('all')">Print All</button>
          </div>
        </div>

        <section class="install-prompt" x-show="showInstallPrompt" x-transition>
          <div class="install-copy">
            <h2>Install Chore Charts</h2>
            <p x-text="installPromptMessage"></p>
          </div>
          <div class="install-actions">
            <button type="button" class="primary-button" @click="installApp" x-text="installPromptActionLabel"></button>
            <button type="button" class="icon-button" @click="dismissInstallPrompt" aria-label="Dismiss install prompt" title="Dismiss install prompt" x-html="uiIcon('close')"></button>
          </div>
        </section>

        <div class="chart-settings">
          <label class="field">
            <span>Child</span>
            <select x-model="chart.activeChildId">
              <template x-for="child in chart.children" :key="child.id">
                <option :value="child.id" x-text="child.childName"></option>
              </template>
            </select>
          </label>
          <label class="field">
            <span>Name</span>
            <input type="text" x-model="activeChild.childName">
          </label>
          <div class="field">
            <span>Orientation</span>
            <div class="segmented">
              <button type="button" :class="{ active: activeChild.orientation === 'landscape' }" @click="activeChild.orientation = 'landscape'">Landscape</button>
              <button type="button" :class="{ active: activeChild.orientation === 'portrait' }" @click="activeChild.orientation = 'portrait'">Portrait</button>
            </div>
          </div>
          <div class="button-row child-actions">
            <button type="button" @click="addChild">Add Child</button>
            <button type="button" @click="duplicateChild">Duplicate</button>
            <button type="button" :disabled="chart.children.length === 1" @click="deleteChild">Delete</button>
          </div>
        </div>
      </header>

      <section class="editor-workspace" x-show="viewMode === 'edit'">
        <section class="control-section">
          <div class="section-heading">
            <h2>Days</h2>
          </div>
          <div class="day-editor">
            <template x-for="day in activeChild.days" :key="day.key">
              <div class="day-control">
                <input type="text" x-model="day.label" aria-label="Day label">
                <input type="color" x-model="day.color" :aria-label="`${day.label} color`">
              </div>
            </template>
          </div>
        </section>

        <div class="section-list" x-sort="sortSections($item, $position)">
        <template x-for="(section, sectionIndex) in activeChild.sections" :key="section.id">
          <section class="chore-section" x-sort:item="section.id">
            <div class="section-toolbar">
              <button type="button" class="icon-button drag-button" x-sort:handle aria-label="Drag section" title="Drag section" x-html="uiIcon('grip')"></button>
              <input type="text" x-model="section.name" aria-label="Section name">
              <button type="button" class="small-add-button" @click="addRow(section)" aria-label="Add chore">
                <span x-html="uiIcon('plus')"></span>
                <span>Add Chore</span>
              </button>
              <div class="summary-actions">
                <button type="button" class="icon-button danger-button" @click="deleteSection(sectionIndex)" aria-label="Delete section" title="Delete section" x-html="uiIcon('delete')"></button>
              </div>
            </div>

            <div class="chore-grid">
              <div class="chore-editor-row chore-grid-header">
                <div class="grid-heading chore-name-heading">Chore</div>
                <template x-for="day in activeChild.days" :key="`${section.id}-head-${day.key}`">
                  <div class="grid-heading day-check-heading" x-text="day.label"></div>
                </template>
                <div class="grid-heading paid-heading">Paid</div>
                <span class="icon-button action-heading-spacer" aria-hidden="true" x-html="uiIcon('grip')"></span>
                <span class="icon-button action-heading-spacer" aria-hidden="true" x-html="uiIcon('delete')"></span>
              </div>

              <div class="chore-list" x-sort="sortRows(section.rows, $item, $position)">
              <template x-for="(row, rowIndex) in section.rows" :key="row.id">
                <div class="chore-editor-row" x-sort:item="row.id">
                  <div class="chore-name-cell">
                    <div class="icon-picker" x-data="{ open: false, iconQuery: '' }">
                      <button type="button" class="icon-picker-trigger" @click="open = !open" aria-label="Pick icon">
                        <span class="icon-picker-preview svg-icon" x-show="rowIconChoice(row)" x-html="renderIcon(row)"></span>
                        <span class="icon-picker-empty" x-show="!rowIconChoice(row)">Icon</span>
                      </button>
                      <div class="icon-picker-dropdown" x-show="open" @click.outside="open = false" x-transition>
                        <input type="search" class="icon-picker-search" x-model="iconQuery" placeholder="Search icons" aria-label="Search icons">
                        <div class="icon-picker-grid">
                          <button type="button" class="icon-picker-option icon-picker-none-option" :class="{ active: !rowIconChoice(row) }" @click="setRowIconChoice(row, ''); open = false">
                            <span class="icon-picker-none">None</span>
                          </button>
                          <template x-for="option in filteredIconOptions(iconQuery)" :key="iconValue(option)">
                            <button type="button" class="icon-picker-option" :class="{ active: rowIconChoice(row) === iconValue(option), favorite: isFavoriteIcon(option) }" @click="setRowIconChoice(row, option); open = false" :title="option.label">
                              <span class="svg-icon" x-html="renderIcon(option)"></span>
                              <span class="favorite-toggle" @click.stop="toggleFavoriteIcon(option)" :aria-label="isFavoriteIcon(option) ? 'Remove favorite icon' : 'Favorite icon'" :title="isFavoriteIcon(option) ? 'Remove favorite' : 'Favorite'"></span>
                            </button>
                          </template>
                        </div>
                        <div class="icon-picker-empty-results" x-show="filteredIconOptions(iconQuery).length === 0">No matches</div>
                      </div>
                    </div>
                    <div class="chore-label-field">
                      <input type="text" x-model="row.label" @input="syncRowFromFields(row)" class="regular-label-input" placeholder="Chore name">
                      <button type="button" class="show-label-toggle" @click="row.showLabel = row.showLabel === false; syncRowFromFields(row)" :disabled="!rowIconChoice(row)" :title="row.showLabel !== false ? 'Hide label on chart' : 'Show label on chart'" aria-label="Toggle label visibility on chart">
                        <span class="show-label-toggle-icon svg-icon" x-html="row.showLabel !== false ? uiIcon('eye') : uiIcon('eyeOff')"></span>
                      </button>
                    </div>
                  </div>

                  <template x-for="day in activeChild.days" :key="`${row.id}-${day.key}`">
                    <label class="day-toggle" :style="`--day-color: ${day.color}`">
                      <input type="checkbox" x-model="row.days[day.key]">
                      <span class="day-toggle-mark"></span>
                      <span class="day-toggle-label" x-text="day.label"></span>
                    </label>
                  </template>

                  <label class="paid-checkbox">
                    <input type="checkbox" x-model="row.paid">
                    <span x-html="paidCoin"></span>
                  </label>

                  <button type="button" class="icon-button drag-button chore-row-drag" x-sort:handle aria-label="Drag chore" title="Drag chore" x-html="uiIcon('grip')"></button>
                  <button type="button" class="icon-button danger-button chore-row-delete" @click="deleteRow(section, rowIndex)" aria-label="Delete chore" title="Delete chore" x-html="uiIcon('delete')"></button>
                </div>
              </template>
              </div>
            </div>
          </section>
        </template>
        </div>

        <div class="add-section-row">
          <button type="button" @click="addSection">Add Section</button>
        </div>

        <section class="chore-section">
          <div class="section-toolbar">
            <input type="text" x-model="activeChild.weeklyChores.title" aria-label="Weekly chores title">
            <button type="button" class="small-add-button" @click="addWeeklyRow" aria-label="Add weekly chore">
              <span x-html="uiIcon('plus')"></span>
              <span>Add Chore</span>
            </button>
          </div>

          <div class="weekly-grid">
            <div class="weekly-editor-row weekly-grid-header">
              <div class="grid-heading">Weekly chore</div>
              <div class="grid-heading">Paid</div>
              <span class="icon-button action-heading-spacer" aria-hidden="true" x-html="uiIcon('grip')"></span>
              <span class="icon-button action-heading-spacer" aria-hidden="true" x-html="uiIcon('delete')"></span>
            </div>

            <div class="weekly-list" x-sort="sortRows(activeChild.weeklyChores.rows, $item, $position)">
            <template x-for="(row, rowIndex) in activeChild.weeklyChores.rows" :key="row.id">
              <div class="weekly-editor-row" x-sort:item="row.id">
                <div class="weekly-name-cell">
                <div class="icon-picker" x-data="{ open: false, iconQuery: '' }">
                  <button type="button" class="icon-picker-trigger" @click="open = !open" aria-label="Pick weekly chore icon">
                    <span class="icon-picker-preview svg-icon" x-show="rowIconChoice(row)" x-html="renderIcon(row)"></span>
                    <span class="icon-picker-empty" x-show="!rowIconChoice(row)">Icon</span>
                  </button>
                  <div class="icon-picker-dropdown" x-show="open" @click.outside="open = false" x-transition>
                    <input type="search" class="icon-picker-search" x-model="iconQuery" placeholder="Search icons" aria-label="Search icons">
                    <div class="icon-picker-grid">
                      <button type="button" class="icon-picker-option icon-picker-none-option" :class="{ active: !rowIconChoice(row) }" @click="setRowIconChoice(row, ''); open = false">
                        <span class="icon-picker-none">None</span>
                      </button>
                      <template x-for="option in filteredIconOptions(iconQuery)" :key="iconValue(option)">
                        <button type="button" class="icon-picker-option" :class="{ active: rowIconChoice(row) === iconValue(option), favorite: isFavoriteIcon(option) }" @click="setRowIconChoice(row, option); open = false" :title="option.label">
                          <span class="svg-icon" x-html="renderIcon(option)"></span>
                          <span class="favorite-toggle" @click.stop="toggleFavoriteIcon(option)" :aria-label="isFavoriteIcon(option) ? 'Remove favorite icon' : 'Favorite icon'" :title="isFavoriteIcon(option) ? 'Remove favorite' : 'Favorite'"></span>
                        </button>
                      </template>
                    </div>
                    <div class="icon-picker-empty-results" x-show="filteredIconOptions(iconQuery).length === 0">No matches</div>
                  </div>
                </div>
                <div class="chore-label-field">
                  <input type="text" x-model="row.label" @input="syncRowFromFields(row)" placeholder="Weekly chore">
                  <button type="button" class="show-label-toggle" @click="row.showLabel = row.showLabel === false; syncRowFromFields(row)" :disabled="!rowIconChoice(row)" :title="row.showLabel !== false ? 'Hide label on chart' : 'Show label on chart'" aria-label="Toggle label visibility on chart">
                    <span class="show-label-toggle-icon svg-icon" x-html="row.showLabel !== false ? uiIcon('eye') : uiIcon('eyeOff')"></span>
                  </button>
                </div>
                </div>
                <label class="paid-checkbox">
                  <input type="checkbox" x-model="row.paid">
                  <span x-html="paidCoin"></span>
                </label>
                <button type="button" class="icon-button drag-button" x-sort:handle aria-label="Drag weekly chore" title="Drag weekly chore" x-html="uiIcon('grip')"></button>
                <button type="button" class="icon-button danger-button" @click="deleteWeeklyRow(rowIndex)" aria-label="Delete weekly chore" title="Delete weekly chore" x-html="uiIcon('delete')"></button>
              </div>
            </template>
            </div>
          </div>
        </section>

        <section class="control-section">
          <h2>Data</h2>
          <div class="button-row">
            <button type="button" @click="saveJson">Save JSON</button>
            <button type="button" @click="saveJsonAs">Save As</button>
            <button type="button" @click="openJsonFile">Open JSON</button>
            <button type="button" @click="openShareDialog">Share JSON</button>
            <button type="button" @click="downloadJson">Download JSON</button>
            <label class="file-button">
              Import JSON
              <input x-ref="jsonFileInput" type="file" accept="application/json,.json" @change="importJson">
            </label>
            <button type="button" @click="resetToDefaults">Reset</button>
          </div>
          <p class="data-status" x-show="dataStatus" x-text="dataStatus"></p>
          <p class="import-error" x-show="importError" x-text="importError"></p>
        </section>
      </section>

      <dialog class="share-dialog" x-ref="shareDialog" @close="shareCopyStatus = ''">
        <form method="dialog" class="share-dialog-panel">
          <div class="share-dialog-header">
            <div>
              <h2>Share JSON</h2>
              <p x-text="suggestedFileName()"></p>
            </div>
            <button type="submit" class="icon-button" aria-label="Close share dialog" title="Close share dialog" x-html="uiIcon('close')"></button>
          </div>
          <textarea x-ref="shareJsonTextArea" x-model="shareJsonText" readonly aria-label="Current chart JSON"></textarea>
          <div class="share-dialog-actions">
            <p x-show="shareCopyStatus" x-text="shareCopyStatus"></p>
            <div class="button-row">
              <button type="button" @click="copyShareJson">Copy JSON</button>
              <button type="button" class="primary-button" @click="shareJson">Share</button>
            </div>
          </div>
        </form>
      </dialog>

      <section class="preview-panel" x-show="viewMode === 'preview'">
        <div class="preview-scroll screen-preview">
          <template x-if="storageReady">
          <article class="chart-page" :class="activeChild.orientation">
            <h1 class="chart-title" x-text="`${activeChild.childName}'s Responsibility Chart`"></h1>
            <div class="chart-grid">
              <template x-for="day in activeChild.days" :key="`header-${day.key}`">
                <div class="day-header" :style="`grid-column: span 3; background-color: ${day.color}`" x-text="day.label"></div>
              </template>

              <template x-for="section in activeChild.sections" :key="section.id">
                <div class="contents">
                  <div class="section-row" style="grid-column: 1 / -1" x-text="section.name"></div>

                  <template x-for="group in sectionIconGroups(section)" :key="group.id">
                    <div class="contents">
                      <template x-for="cell in printIconCells(group)" :key="cell.key">
                        <div class="chart-cell icon-cell" :style="`display: ${cell.visible ? 'flex' : 'none'}; grid-column: ${cell.gridColumn}; background-color: ${cell.color}`">
                          <span class="paid-marker" x-show="cell.row.paid" x-html="paidCoin"></span>
                          <span class="icon-render svg-icon" x-html="renderIcon(cell.row)"></span>
                        </div>
                      </template>
                    </div>
                  </template>

                  <template x-for="row in sectionDetailRows(section)" :key="row.id">
                    <div class="contents">
                      <template x-for="cell in printDayCells(row)" :key="cell.key">
                        <div class="chart-cell" :class="row.type === 'empty' ? 'write-cell' : 'text-cell'" :style="`display: ${cell.visible ? 'flex' : 'none'}; grid-column: ${cell.gridColumn}; background-color: ${cell.color}`">
                          <span class="paid-marker" x-show="row.paid" x-html="paidCoin"></span>
                          <span class="regular-chore-icon svg-icon" x-show="rowShowsInlineIcon(row)" x-html="renderIcon(row)"></span>
                          <span x-show="rowShowsLabel(row)" x-text="row.label"></span>
                          <span class="write-line" x-show="row.type === 'empty'"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>

              <div class="section-row weekly-title" style="grid-column: 1 / -1" x-text="activeChild.weeklyChores.title"></div>
              <template x-for="(row, rowIndex) in activeChild.weeklyChores.rows" :key="row.id">
                <div class="chart-cell weekly-cell" :class="rowShowsIconOnly(row) ? 'icon-only-cell' : ''" :style="`grid-column: ${weeklyCellGridColumn(rowIndex)}`">
                  <span class="paid-marker" x-show="row.paid" x-html="paidCoin"></span>
                  <span class="icon-render svg-icon" x-show="rowShowsIconOnly(row)" x-html="renderIcon(row)"></span>
                  <span class="regular-chore-icon svg-icon" x-show="rowShowsInlineIcon(row)" x-html="renderIcon(row)"></span>
                  <span x-show="rowShowsLabel(row)" x-text="row.label"></span>
                  <span class="write-line" x-show="row.type === 'empty'"></span>
                </div>
              </template>
            </div>
          </article>
          </template>
        </div>
      </section>

      <div class="print-all-pages" aria-hidden="true">
        <template x-if="storageReady">
        <div class="contents">
        <template x-for="child in chart.children" :key="`print-${child.id}`">
          <article class="chart-page" :class="child.orientation">
            <h1 class="chart-title" x-text="`${child.childName}'s Responsibility Chart`"></h1>
            <div class="chart-grid">
              <template x-for="day in child.days" :key="`${child.id}-header-${day.key}`">
                <div class="day-header" :style="`grid-column: span 3; background-color: ${day.color}`" x-text="day.label"></div>
              </template>

              <template x-for="section in child.sections" :key="`${child.id}-${section.id}`">
                <div class="contents">
                  <div class="section-row" style="grid-column: 1 / -1" x-text="section.name"></div>

                  <template x-for="group in sectionIconGroups(section)" :key="`${child.id}-${group.id}`">
                    <div class="contents">
                      <template x-for="cell in printIconCells(group, child)" :key="`${child.id}-${cell.key}`">
                        <div class="chart-cell icon-cell" :style="`display: ${cell.visible ? 'flex' : 'none'}; grid-column: ${cell.gridColumn}; background-color: ${cell.color}`">
                          <span class="paid-marker" x-show="cell.row.paid" x-html="paidCoin"></span>
                          <span class="icon-render svg-icon" x-html="renderIcon(cell.row)"></span>
                        </div>
                      </template>
                    </div>
                  </template>

                  <template x-for="row in sectionDetailRows(section)" :key="`${child.id}-${row.id}`">
                    <div class="contents">
                      <template x-for="cell in printDayCells(row, child)" :key="`${child.id}-${cell.key}`">
                        <div class="chart-cell" :class="row.type === 'empty' ? 'write-cell' : 'text-cell'" :style="`display: ${cell.visible ? 'flex' : 'none'}; grid-column: ${cell.gridColumn}; background-color: ${cell.color}`">
                          <span class="paid-marker" x-show="row.paid" x-html="paidCoin"></span>
                          <span class="regular-chore-icon svg-icon" x-show="rowShowsInlineIcon(row)" x-html="renderIcon(row)"></span>
                          <span x-show="rowShowsLabel(row)" x-text="row.label"></span>
                          <span class="write-line" x-show="row.type === 'empty'"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>

              <div class="section-row weekly-title" style="grid-column: 1 / -1" x-text="child.weeklyChores.title"></div>
              <template x-for="(row, rowIndex) in child.weeklyChores.rows" :key="`${child.id}-${row.id}`">
                <div class="chart-cell weekly-cell" :class="rowShowsIconOnly(row) ? 'icon-only-cell' : ''" :style="`grid-column: ${weeklyCellGridColumn(rowIndex)}`">
                  <span class="paid-marker" x-show="row.paid" x-html="paidCoin"></span>
                  <span class="icon-render svg-icon" x-show="rowShowsIconOnly(row)" x-html="renderIcon(row)"></span>
                  <span class="regular-chore-icon svg-icon" x-show="rowShowsInlineIcon(row)" x-html="renderIcon(row)"></span>
                  <span x-show="rowShowsLabel(row)" x-text="row.label"></span>
                  <span class="write-line" x-show="row.type === 'empty'"></span>
                </div>
              </template>
            </div>
          </article>
        </template>
        </div>
        </template>
      </div>
    </main>
  </body>
</html>
